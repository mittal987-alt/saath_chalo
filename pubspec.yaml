name: saathchalo
description: AI Powered Carpooling App for India
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_messaging: ^14.7.10
  razorpay_flutter: ^1.3.6

  # Maps
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  google_generative_ai: ^0.4.3

  # State Management
  provider: ^6.1.1

  # UI
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  lottie: ^2.7.0

  # Utils
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.5
  http: ^1.1.0
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/